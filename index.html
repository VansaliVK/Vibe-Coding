<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <h1 class="card-title">Student Profile Card</h1>
        <div class="img-container">
            <!-- DiceBear Avatar as a clip-art style placeholder -->
            <img src="https://cdn.creativefabrica.com/2022/03/09/Woman-Icon-Teen-Profile-Graphics-26722130-1.jpg" alt="Profile Clip Art" class="profile-img">
        </div>
        <h2 class="name">Vansali Vidarshana Karunathilaka</h2>
        <p class="stream">Computer Science</p>
        <div class="bio-container">
            <p class="bio">Passionate about building scalable web applications and exploring the depths of machine learning. Always curious, always coding.</p>
        </div>
    </div>
</body>
</html>
